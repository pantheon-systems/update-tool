name: Release
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # autotag needs full history to find the last reachable tag and
          # inspect the commits since then.
          fetch-depth: 0
      - name: Autotag and release
        uses: pantheon-systems/action-autotag@2c38d4e46499ae4c6c3bb11562ec264839ce6105 # v1.2.0
        with:
          v-prefix: false
