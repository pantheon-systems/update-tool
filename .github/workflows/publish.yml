name: Deploy
on:
  repository_dispatch:
    types: [tests-passed]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup PHP
        uses: shivammathur/setup-php@1c8b931092191aa6384909135bb73949ac1528ce # v2
        with:
          php-version: '8.2'
      - name: Get tag name
        id: tag_name
        run: echo "tag_name=${{ github.event.client_payload.tag_name }}" >> $GITHUB_ENV
      - name: Build phar
        run: |
          composer install
          curl -sL https://github.com/clue/phar-composer/releases/download/v1.4.0/phar-composer-1.4.0.phar -o vendor/bin/phar-composer.phar
          chmod +x vendor/bin/phar-composer.phar
          composer phar:build
      - name: Publish Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ env.tag_name }}
          artifacts: 'update-tool.phar'
          artifactErrorsFailBuild: true
          body: Version ${{ env.tag_name }}
          generateReleaseNotes: true
          makeLatest: true
