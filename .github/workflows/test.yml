name: Test
on:
  pull_request:
  push:
    tags:
      - '*'

permissions:
  contents: read

concurrency:
  group: test-fixtures
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set PHP version
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress
      - name: Unset GitHub Tokens
        shell: bash
        run: |
          unset GITHUB_TOKEN
          unset GH_TOKEN
      - name: Run Update Tool Whoami
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.PANTHEON_UPSTREAM_AUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.PANTHEON_UPSTREAM_AUTH_TOKEN }}
        run: |
          git config --global user.email "bot@getpantheon.com"
          git config --global user.name "Pantheon Automation"
          gh auth status
          ./update-tool whoami
      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info
      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.PANTHEON_UPSTREAM_AUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.PANTHEON_UPSTREAM_AUTH_TOKEN }}
          DB_USER: root
          DB_NAME: updatinate-wp-db
        run: composer test
  send-dispatch:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Send Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PANTHEON_UPSTREAM_AUTH_TOKEN }}
          repository: pantheon-systems/update-tool
          event-type: tests-passed
          client-payload: '{"tag_name": "${{ github.ref_name }}"}'
